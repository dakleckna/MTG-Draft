<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Draft ReViewer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main id="app">
    <section class="controls" aria-label="Draft Auswahl">
      <label class="draft-picker">
        Draft
        <select id="draftSelect"></select>
      </label>

      <button id="loadBtn" type="button">Laden</button>
    </section>

    <section id="status" class="status" aria-live="polite"></section>

    <section id="progress" class="progress" aria-label="Ladefortschritt" hidden>
      <div class="progress-row">
        <span id="progressLabel">Bereite Laden vor...</span>
        <span id="progressPercent">0%</span>
      </div>

      <div class="progress-track" aria-hidden="true">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <div id="progressTime" class="progress-time"></div>
    </section>

    <section id="results" class="results"></section>
  </main>

  <template id="cardTemplate">
    <article class="card">
      <div class="image-wrap">
        <div class="missing-img">Bild laedt...</div>
      </div>

      <div class="card-body">
        <div class="card-topline"></div>
        <h3></h3>
        <div class="rating"></div>
        <p class="review"></p>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
